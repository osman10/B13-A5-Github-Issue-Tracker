<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>GitHub Issues Tracker</title>
    <!-- tailwind css -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- google fonts -->

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />
    <!-- fontawesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css"
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <!-- main style -->
    <link rel="stylesheet" href="style.css" />
</head>

<body class="bg-[#f8fafc]">
    <header>
        <div class="flex flex-wrap items-center justify-between border-b-2 border-gray-200 p-6">
            <div class="flex items-center gap-1">
                <img src="./assets/github-logo.png" alt="GitHub" class="h-9 w-9">
                <h1 class="font-semibold text-2xl">GitHub Issues Tracker</h1>
            </div>
            <div class="flex gap-2">
                <div class="flex items-center px-2 rounded-md shadow border border-gray-200">
                    <span class="text-gray-400 font-bold text-2xl p-1"><i class="fa-brands fa-sistrix"></i></span>
                    <input class="focus:outline-none" type="text" placeholder="Search Issues..." class="">
                </div>
                <button
                    class="inline-flex items-center justify-center bg-[#4A00FF] text-white text-base font-bold rounded-md cursor-pointer hover:bg-[#3906b9] transition px-4 py-2">
                    + New Issue
                </button>
            </div>
        </div>
    </header>
    <!-- status buttons -->
    <section>
        <div class="bg-white p-6 rounded-md shadow-md mt-10 max-w-[1110px] mx-auto">
            <div class="flex flex-wrap items-center gap-2">
                <button onclick="showJobCards()" class="w-full sm:max-w-[100px] catagoryBtn active">All</button>
                <button onclick="showJobCards()" class="w-full sm:max-w-[100px] catagoryBtn">Open</button>
                <button onclick="showJobCards()" class="w-full sm:max-w-[100px] catagoryBtn">Closed</button>
            </div>
        </div>
    </section>

    <!-- status counts -->
    <section>
        <div class="bg-white p-6 rounded-t-md mt-5 max-w-[1110px] mx-auto border-b-2 border-gray-200">
            <div class="flex items-center justify-between">
                <div class="flex gap-3">
                    <div class="bg-violet-200 rounded-full p-2 flex items-center justify-center h-[50px] w-[50px]">
                        <img class="h-[30px] w-[30px]" src="./assets/Aperture.png" alt="">
                    </div>
                    <div>
                        <h2 class="font-bold text-xl">50 Issues</h2>
                        <p class="text-gray-400">Track and manage your project issues</p>
                    </div>
                </div>
                <div class="flex gap-4 items-center">
                    <div class="flex items-center">
                        <span class="w-3 h-3 bg-green-500 rounded-full mr-2"></span>
                        <span>Open</span>
                    </div>
                    <div class="flex items-center">
                        <span class="w-3 h-3 bg-violet-500 rounded-full mr-2"></span>
                        <span>Close</span>
                    </div>

                </div>
            </div>
        </div>
    </section>

    <!-- loading section -->
     <div id="loading" class="block" >
        <div class="flex h-[100px] w-full  flex-col justify-center items-center">
        <img class="h-[50px] w-[50px]" src="./assets/loading.gif" alt="loading">
        <p class="text-gray-500">Loading data...</p>
        </div>
     </div>




    <!-- card section -->
    <section>
        <div class="p-6 max-w-[1110px] mx-auto">
            <div id="cartContainer" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-3">
            </div>
        </div>
    </section>






    <script src="./card.js"></script>
</body>

</html>
